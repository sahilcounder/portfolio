<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahil Counder — Dev Portfolio</title>

  <!-- React + ReactDOM as UMD globals (window.React / window.ReactDOM) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone: transforms the text/babel block below at runtime -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:#0A0E14; --panel:#0D1117; --raise:#10141C; --line:#1C2433;
      --fg:#BFBDB6; --bright:#E6E1CF; --dim:#5C6773; --faint:#3D4451;
      --orange:#FFB454; --yellow:#E6B450; --green:#AAD94C; --blue:#59C2FF;
      --purple:#D2A6FF; --red:#F07178; --cyan:#95E6CB;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:var(--bg); color:var(--fg);
      font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:14px; line-height:1.65; -webkit-font-smoothing:antialiased;
    }
    #root{min-height:100vh}
    ::selection{background:rgba(89,194,255,.25)}
    a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

    /* ── window chrome ── */
    .app{display:flex;flex-direction:column;min-height:100vh}
    .titlebar{
      display:flex;align-items:center;gap:14px;height:38px;padding:0 14px;
      background:var(--panel);border-bottom:1px solid var(--line);user-select:none;
    }
    .dots{display:flex;gap:8px}
    .dot{width:12px;height:12px;border-radius:50%}
    .dot.r{background:#FF5F57}.dot.y{background:#FEBC2E}.dot.g{background:#28C840}
    .titlebar .name{color:var(--dim);font-size:12.5px}
    .titlebar .name b{color:var(--fg);font-weight:500}
    .titlebar .right{margin-left:auto;color:var(--faint);font-size:12px;letter-spacing:.04em}

    /* ── body grid ── */
    .shell{flex:1;display:grid;grid-template-columns:48px 232px 1fr;min-height:0}
    .activity{
      background:var(--panel);border-right:1px solid var(--line);
      display:flex;flex-direction:column;align-items:center;padding-top:14px;gap:18px;
    }
    .activity .ico{color:var(--faint);font-size:18px;line-height:1;transition:color .15s}
    .activity .ico.on{color:var(--bright)}
    .activity .ico:hover{color:var(--fg)}

    .explorer{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:14px 0}
    .explorer .head{padding:0 16px 10px;color:var(--dim);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
    .tree{list-style:none}
    .node{
      display:flex;align-items:center;gap:9px;padding:5px 16px;color:var(--fg);
      font-size:13px;width:100%;text-align:left;transition:background .12s,color .12s;
    }
    .node:hover{background:var(--raise)}
    .node.active{background:var(--raise);color:var(--bright)}
    .node.active::before{content:"";position:absolute;left:0;width:2px;height:21px;background:var(--orange)}
    .node{position:relative}
    .node .glyph{width:14px;text-align:center;font-size:12px}
    .node .ext{color:var(--faint)}
    .node.active .ext{color:var(--orange)}

    /* ── editor ── */
    .editor{display:flex;flex-direction:column;min-width:0;background:var(--bg)}
    .tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto}
    .tab{
      display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:var(--dim);
      border-right:1px solid var(--line);white-space:nowrap;transition:color .12s,background .12s;
    }
    .tab.on{color:var(--bright);background:var(--bg);box-shadow:inset 0 -2px 0 var(--orange)}
    .tab:hover{color:var(--fg)}
    .tab .close{color:var(--faint);font-size:14px}

    .pane{flex:1;overflow-y:auto;position:relative}
    .gutter{position:absolute;top:0;left:0;width:52px;height:100%;
      border-right:1px solid var(--line);pointer-events:none;user-select:none}
    .gline{height:24px;color:var(--faint);font-size:12px;text-align:right;padding-right:14px}
    .content{padding:28px 40px 80px 78px;max-width:980px}

    /* status bar */
    .statusbar{
      display:flex;align-items:center;gap:18px;height:26px;padding:0 14px;
      background:var(--orange);color:#0A0E14;font-size:11.5px;font-weight:500;letter-spacing:.02em;
    }
    .statusbar .seg{display:flex;align-items:center;gap:6px}
    .statusbar .right{margin-left:auto;display:flex;gap:18px}

    /* ── content blocks ── */
    .prompt{color:var(--green)}
    .prompt .tilde{color:var(--blue)}
    .caret{display:inline-block;width:9px;height:17px;background:var(--orange);
      vertical-align:-3px;margin-left:2px;animation:blink 1.05s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}

    .hero h1{font-size:30px;font-weight:700;color:var(--bright);letter-spacing:-.5px;margin:14px 0 6px}
    .hero .role{color:var(--purple);font-size:15px;margin-bottom:18px}
    .hero .role .b{color:var(--dim)}
    .lede{color:var(--fg);max-width:64ch;margin-bottom:26px}
    .lede .k{color:var(--cyan)}
    .lede .s{color:var(--green)}

    .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
    .btn{
      display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid var(--line);
      border-radius:6px;color:var(--fg);font-size:13px;transition:.15s;background:var(--raise);
    }
    .btn:hover{border-color:var(--orange);color:var(--bright);transform:translateY(-1px)}
    .btn.solid{background:var(--orange);color:#0A0E14;border-color:var(--orange);font-weight:500}
    .btn.solid:hover{background:#ffc06b}

    .sec-label{color:var(--dim);font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin:0 0 16px}
    .sec-label .hash{color:var(--orange)}

    .mdh{color:var(--bright);font-weight:700;font-size:20px;margin:0 0 4px}
    .mdh .hash{color:var(--orange);margin-right:8px}
    .mdsub{color:var(--dim);margin-bottom:24px}

    .prose p{margin-bottom:14px;max-width:70ch}
    .prose .hl{color:var(--bright)}
    .prose a.link{color:var(--blue);border-bottom:1px solid rgba(89,194,255,.35)}
    .prose a.link:hover{border-color:var(--blue)}

    /* json-styled skills */
    .json{color:var(--fg);white-space:pre-wrap;font-size:13.5px}
    .json .key{color:var(--blue)}
    .json .str{color:var(--green)}
    .json .num{color:var(--orange)}
    .json .punc{color:var(--dim)}

    .skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px;margin-top:8px}
    .chipcard{border:1px solid var(--line);border-radius:8px;padding:14px;background:var(--raise);transition:.15s}
    .chipcard:hover{border-color:var(--faint);transform:translateY(-2px)}
    .chipcard .t{color:var(--bright);font-size:13px;margin-bottom:10px}
    .bar{height:5px;border-radius:3px;background:var(--line);overflow:hidden}
    .bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--orange),var(--yellow))}
    .chipcard .lvl{color:var(--dim);font-size:11px;margin-top:7px}

    /* project cards */
    .proj{display:grid;gap:16px}
    .pcard{
      border:1px solid var(--line);border-radius:10px;padding:20px 22px;background:var(--panel);
      transition:.18s;position:relative;overflow:hidden;
    }
    .pcard:hover{border-color:var(--faint);background:var(--raise)}
    .pcard::before{content:"";position:absolute;left:0;top:0;height:100%;width:3px;
      background:var(--accent,var(--orange));opacity:.0;transition:opacity .18s}
    .pcard:hover::before{opacity:1}
    .pcard .ptop{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
    .pcard .ptop .n{color:var(--bright);font-size:15px;font-weight:500}
    .pcard .ptop .yr{color:var(--faint);font-size:12px;margin-left:auto}
    .pcard .pd{color:var(--fg);margin-bottom:14px;max-width:72ch}
    .pcard .stack{display:flex;flex-wrap:wrap;gap:7px}
    .tag{font-size:11px;color:var(--cyan);border:1px solid var(--line);border-radius:5px;padding:3px 9px}
    .pcard .links{display:flex;gap:16px;margin-top:14px}
    .pcard .links a{color:var(--blue);font-size:12.5px}
    .pcard .links a:hover{color:var(--bright)}

    /* experience log */
    .logline{display:flex;gap:14px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:baseline}
    .logline:last-child{border-bottom:none}
    .logline .ts{color:var(--faint);font-size:12px;min-width:108px}
    .logline .lvl-i{color:var(--green)}
    .logline .lvl-w{color:var(--yellow)}
    .logline .body .r{color:var(--bright)}
    .logline .body .c{color:var(--purple)}
    .logline .body span.meta{color:var(--dim)}

    /* contact */
    .term{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;max-width:620px}
    .term .bar{display:flex;align-items:center;gap:8px;height:32px;padding:0 12px;background:var(--raise);border-bottom:1px solid var(--line)}
    .term .bar .t{color:var(--dim);font-size:12px;margin-left:6px}
    .term .body{padding:18px 18px 22px}
    .term .line{margin-bottom:6px}
    .term .out{color:var(--fg)}
    .term .out a{color:var(--blue)}
    .term .out a:hover{color:var(--bright)}

    @media (max-width:860px){
      .shell{grid-template-columns:44px 1fr}
      .explorer{display:none}
      .content{padding:24px 20px 70px 60px}
      .gutter{width:40px}
      .gline{font-size:11px}
    }
    @media (prefers-reduced-motion:reduce){
      *{animation:none!important;transition:none!important}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- NOTE: no `import`/`export` anywhere in this block.
       React, ReactDOM, hooks all come from the UMD globals above.
       That is what keeps Babel-standalone from throwing
       "Cannot use import statement outside a module." -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ───────── data (edit these) ───────── */
    const FILES = [
      { id:"about",      label:"about",      ext:"md",  glyph:"≡", color:"var(--blue)"   },
      { id:"skills",     label:"skills",     ext:"json",glyph:"{}", color:"var(--yellow)" },
      { id:"projects",   label:"projects",   ext:"tsx", glyph:"⬡", color:"var(--cyan)"   },
      { id:"experience", label:"experience", ext:"log", glyph:"≣", color:"var(--green)"  },
      { id:"contact",    label:"contact",    ext:"sh",  glyph:"›",  color:"var(--purple)"},
    ];

    const SKILLS = [
      { t:"TypeScript",  lvl:92, tier:"daily driver" },
      { t:"React / Next",lvl:90, tier:"daily driver" },
      { t:"Node.js",     lvl:85, tier:"fluent" },
      { t:"Python",      lvl:80, tier:"fluent" },
      { t:"Rust",        lvl:62, tier:"learning" },
      { t:"PostgreSQL",  lvl:78, tier:"fluent" },
      { t:"Docker / CI", lvl:74, tier:"fluent" },
      { t:"AWS",         lvl:70, tier:"comfortable" },
    ];

    const PROJECTS = [
      { n:"realtime-ledger", yr:"2025", accent:"var(--orange)",
        d:"Event-sourced ledger handling ~4k writes/sec with idempotent replay and zero-downtime migrations. Built the reconciliation engine and the audit trail.",
        stack:["Rust","Postgres","gRPC","Kafka"], demo:"#", code:"#" },
      { n:"atlas-design-system", yr:"2024", accent:"var(--blue)",
        d:"Headless component library + token pipeline adopted by 6 product teams. Themeable, fully typed, ships its own a11y test harness.",
        stack:["React","TypeScript","Tailwind","Storybook"], demo:"#", code:"#" },
      { n:"vector-search-api", yr:"2024", accent:"var(--green)",
        d:"Semantic search service over 12M docs with hybrid BM25 + embedding rerank. Sub-80ms p95 behind a thin FastAPI layer.",
        stack:["Python","FastAPI","pgvector","Redis"], demo:"#", code:"#" },
    ];

    const LOG = [
      { ts:"2024 → now",  lvl:"INFO", role:"Senior Software Engineer", co:"Northwind Labs",
        meta:"led the platform team · 0→1 on the billing core" },
      { ts:"2021 → 2024", lvl:"INFO", role:"Full-Stack Engineer", co:"Cobalt Systems",
        meta:"shipped the design system · mentored 4 juniors" },
      { ts:"2019 → 2021", lvl:"INFO", role:"Frontend Engineer", co:"Drift & Co.",
        meta:"rebuilt the dashboard · cut TTI by 48%" },
      { ts:"2019",        lvl:"WARN", role:"B.Tech, Computer Science", co:"State University",
        meta:"graduated · first job offer two weeks later" },
    ];

    const CONTACT = [
      { label:"email",   value:"sahil@example.com",            href:"mailto:sahil@example.com" },
      { label:"github",  value:"github.com/sahil",             href:"#" },
      { label:"linkedin",value:"linkedin.com/in/sahil",        href:"#" },
    ];

    /* ───────── typewriter for hero ───────── */
    function useTyped(text, speed = 38, start = true){
      const [out, setOut] = useState("");
      const [done, setDone] = useState(false);
      useEffect(() => {
        if(!start){ return; }
        const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if(reduce){ setOut(text); setDone(true); return; }
        let i = 0;
        const id = setInterval(() => {
          i++;
          setOut(text.slice(0, i));
          if(i >= text.length){ clearInterval(id); setDone(true); }
        }, speed);
        return () => clearInterval(id);
      }, [text, speed, start]);
      return [out, done];
    }

    /* ───────── gutter line numbers ───────── */
    function Gutter({ n }){
      const rows = useMemo(() => Array.from({length:n}, (_,i)=>i+1), [n]);
      return (
        <div className="gutter" aria-hidden="true">
          <div style={{paddingTop:"28px"}}>
            {rows.map(r => <div className="gline" key={r}>{r}</div>)}
          </div>
        </div>
      );
    }

    /* ───────── panes ───────── */
    function About({ onOpen }){
      const [line1, d1] = useTyped("whoami");
      const [line2] = useTyped("Sahil Counder — software engineer", 30, d1);
      return (
        <div className="prose hero">
          <div className="prompt"><span className="tilde">~/portfolio</span> $ {line1}{!d1 && <span className="caret"/>}</div>
          {d1 && <h1>{line2}{line2.length < "Sahil Counder — software engineer".length && <span className="caret"/>}</h1>}
          <p className="role"><span className="b">role:</span> Full-stack engineer · systems &amp; product</p>
          <p className="lede">
            I build the unglamorous parts that make products feel fast — <span className="s">data layers</span>,
            <span className="s"> APIs</span>, and <span className="s">design systems</span> — and I care about the
            details users never see but always feel. Currently shipping platform infrastructure at
            <span className="k"> Northwind Labs</span>.
          </p>
          <div className="cta-row">
            <button className="btn solid" onClick={() => onOpen("projects")}>↳ view projects</button>
            <button className="btn" onClick={() => onOpen("contact")}>get in touch</button>
            <button className="btn" onClick={downloadResume}>↓ résumé.txt</button>
          </div>
        </div>
      );
    }

    function Skills(){
      return (
        <div>
          <div className="sec-label"><span className="hash">{"{}"}</span> skills.json</div>
          <h2 className="mdh"><span className="hash">#</span>Stack</h2>
          <p className="mdsub">// proficiency self-reported, calibrated by years in production</p>
          <div className="skill-grid">
            {SKILLS.map(s => (
              <div className="chipcard" key={s.t}>
                <div className="t">{s.t}</div>
                <div className="bar"><i style={{width:s.lvl+"%"}}/></div>
                <div className="lvl">{s.tier} · {s.lvl}%</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Projects(){
      return (
        <div>
          <div className="sec-label"><span className="hash">⬡</span> projects.tsx</div>
          <h2 className="mdh"><span className="hash">#</span>Selected work</h2>
          <p className="mdsub">// three things I'm proud of — links are placeholders, swap them in</p>
          <div className="proj">
            {PROJECTS.map(p => (
              <div className="pcard" key={p.n} style={{["--accent"]:p.accent}}>
                <div className="ptop">
                  <span className="n">{p.n}</span>
                  <span className="yr">{p.yr}</span>
                </div>
                <p className="pd">{p.d}</p>
                <div className="stack">{p.stack.map(t => <span className="tag" key={t}>{t}</span>)}</div>
                <div className="links">
                  <a href={p.demo}>↗ live</a>
                  <a href={p.code}>‹/› source</a>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Experience(){
      return (
        <div>
          <div className="sec-label"><span className="hash">≣</span> experience.log</div>
          <h2 className="mdh"><span className="hash">#</span>History</h2>
          <p className="mdsub">// tail -f career.log</p>
          <div>
            {LOG.map((l,i) => (
              <div className="logline" key={i}>
                <span className="ts">{l.ts}</span>
                <span className={l.lvl === "WARN" ? "lvl-w" : "lvl-i"}>[{l.lvl}]</span>
                <span className="body">
                  <span className="r">{l.role}</span> <span className="meta">@</span> <span className="c">{l.co}</span>
                  <br/><span className="meta">{l.meta}</span>
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Contact(){
      return (
        <div>
          <div className="sec-label"><span className="hash">›</span> contact.sh</div>
          <h2 className="mdh"><span className="hash">#</span>Reach me</h2>
          <p className="mdsub">// I read everything. Recruiters welcome, spam ignored.</p>
          <div className="term">
            <div className="bar">
              <span className="dot r"/><span className="dot y"/><span className="dot g"/>
              <span className="t">— contact.sh</span>
            </div>
            <div className="body">
              {CONTACT.map(c => (
                <div className="line" key={c.label}>
                  <span className="prompt">$</span>{" "}
                  <span style={{color:"var(--dim)"}}>echo ${c.label} →</span>{" "}
                  <span className="out"><a href={c.href}>{c.value}</a></span>
                </div>
              ))}
              <div className="line" style={{marginTop:"10px"}}>
                <span className="prompt">$</span> <span style={{color:"var(--dim)"}}>_</span>
                <span className="caret"/>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* generates a tiny text résumé so the button actually downloads something.
       Replace this with your real PDF/base64 when ready. */
    function downloadResume(){
      const txt =
`SAHIL COUNDER — Software Engineer
sahil@example.com · github.com/sahil

SUMMARY
  Full-stack engineer focused on data layers, APIs and design systems.

EXPERIENCE
  Senior Software Engineer — Northwind Labs (2024–now)
  Full-Stack Engineer — Cobalt Systems (2021–2024)
  Frontend Engineer — Drift & Co. (2019–2021)

SKILLS
  TypeScript, React/Next, Node.js, Python, Rust, PostgreSQL, Docker, AWS
`;
      const blob = new Blob([txt], { type:"text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "sahil-counder-resume.txt";
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    const PANES = { about:About, skills:Skills, projects:Projects, experience:Experience, contact:Contact };
    const LINES = { about:14, skills:18, projects:22, experience:16, contact:14 };

    function App(){
      const [active, setActive] = useState("about");
      const paneRef = useRef(null);
      const Pane = PANES[active];
      const file = FILES.find(f => f.id === active);

      const open = (id) => {
        setActive(id);
        if(paneRef.current){ paneRef.current.scrollTop = 0; }
      };

      return (
        <div className="app">
          <div className="titlebar">
            <div className="dots"><span className="dot r"/><span className="dot y"/><span className="dot g"/></div>
            <div className="name"><b>sahil-counder</b> — portfolio — {file.label}.{file.ext}</div>
            <div className="right">UTF-8 · LF · ⌥⌘</div>
          </div>

          <div className="shell">
            <nav className="activity" aria-label="primary">
              <span className="ico on" title="Explorer">⌗</span>
              <span className="ico" title="Search">⌕</span>
              <span className="ico" title="Source control">⎇</span>
              <span className="ico" title="Run">▷</span>
            </nav>

            <aside className="explorer">
              <div className="head">Explorer</div>
              <ul className="tree">
                {FILES.map(f => (
                  <li key={f.id}>
                    <button
                      className={"node" + (f.id === active ? " active" : "")}
                      onClick={() => open(f.id)}
                      aria-current={f.id === active}>
                      <span className="glyph" style={{color:f.color}}>{f.glyph}</span>
                      <span>{f.label}<span className="ext">.{f.ext}</span></span>
                    </button>
                  </li>
                ))}
              </ul>
            </aside>

            <main className="editor">
              <div className="tabs">
                <div className="tab on">
                  <span style={{color:file.color}}>{file.glyph}</span>
                  {file.label}.{file.ext}
                  <span className="close">×</span>
                </div>
              </div>
              <div className="pane" ref={paneRef}>
                <Gutter n={LINES[active]} />
                <div className="content"><Pane onOpen={open} /></div>
              </div>
            </main>
          </div>

          <div className="statusbar">
            <span className="seg">⎇ main</span>
            <span className="seg">● 0 errors</span>
            <span className="seg">↑ ready</span>
            <span className="right">
              <span>Ln 1, Col 1</span>
              <span>Spaces: 2</span>
              <span>{file.ext.toUpperCase()}</span>
            </span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
