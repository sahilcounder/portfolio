const CODE_REVIEWSERVICE = `@Service
@RequiredArgsConstructor
@Slf4j
public class ReviewService {

    private final GitHubClient gitHubClient;
    private final GeminiClient geminiClient;
    private final DiffChunkerService diffChunker;

    /**
     * Async orchestrator — the webhook controller returns
     * 200 OK in ~100ms; all slow work happens here, in a
     * background thread, beating GitHub's 10s timeout.
     */
    @Async("reviewTaskExecutor")
    public void reviewAsync(WebhookPayload payload) {
        String owner = payload.getRepository().getOwner().getLogin();
        String repo  = payload.getRepository().getName();
        int prNumber = payload.getNumber();

        log.info("Starting async review: {}/{}#{}", owner, repo, prNumber);

        // 1 — fetch the raw unified diff
        String rawDiff = gitHubClient.fetchDiff(owner, repo, prNumber);
        if (rawDiff == null || rawDiff.isBlank()) {
            log.warn("Empty diff — skipping review");
            return;
        }

        // 2 — filter noise files, split oversized diffs
        List<String> chunks = diffChunker.chunk(rawDiff);

        // 3 — Gemini reviews each chunk (structured JSON out)
        ReviewResult result = geminiClient.review(chunks);

        // 4 — post structured feedback back onto the PR
        gitHubClient.postComment(owner, repo, prNumber, result.toMarkdown());
    }
}`;

const CODE_HMAC = `@Service
@Slf4j
public class SignatureVerifierService {

    private static final String HMAC_SHA256 = "HmacSHA256";
    private static final String SIGNATURE_PREFIX = "sha256=";

    @Value("\\u0024{github.webhook-secret}")
    private String webhookSecret;

    /**
     * Verifies GitHub's X-Hub-Signature-256 header.
     * Anyone who finds the webhook URL without the secret
     * gets a 401 — protects the Gemini quota from abuse.
     */
    public boolean verify(String rawBody, String signature) {
        if (rawBody == null || signature == null) return false;

        if (!signature.startsWith(SIGNATURE_PREFIX)) {
            log.warn("Signature missing 'sha256=' prefix");
            return false;
        }

        String expected = computeHmac(rawBody);
        String provided = signature.substring(SIGNATURE_PREFIX.length());

        // constant-time comparison — prevents timing attacks
        return MessageDigest.isEqual(
                expected.getBytes(StandardCharsets.UTF_8),
                provided.getBytes(StandardCharsets.UTF_8)
        );
    }

    private String computeHmac(String data) {
        Mac mac = Mac.getInstance(HMAC_SHA256);
        mac.init(new SecretKeySpec(
                webhookSecret.getBytes(StandardCharsets.UTF_8),
                HMAC_SHA256));
        return bytesToHex(mac.doFinal(
                data.getBytes(StandardCharsets.UTF_8)));
    }
}`;

const CODE_KAFKA = `@Slf4j
@Component
@RequiredArgsConstructor
public class ApplicationEventConsumer {

    private final ScreeningService screeningService;
    private final ObjectMapper objectMapper;

    /**
     * Candidate applies → Application Service publishes an
     * event → this consumer triggers the AI screening
     * pipeline asynchronously. Services stay decoupled.
     */
    @KafkaListener(
        topics = "application-submitted",
        groupId = "screening-group")
    public void onApplicationSubmitted(String message) {
        try {
            JsonNode node = objectMapper.readTree(message);
            Long applicationId = node.get("applicationId").asLong();
            Long jobId         = node.get("jobId").asLong();
            String email       = node.get("candidateEmail").asText();
            String resumePath  = node.get("resumeFilePath").asText();

            log.info("Received application-submitted: id={}", applicationId);
            screeningService.screen(applicationId, jobId, email, resumePath);

        } catch (Exception e) {
            log.error("Failed to process event: {}", e.getMessage());
        }
    }
}`;

                   String candidateEmail, String resumePath) {

    String jobJson = webClientBuilder.build()
            .get()

            .retrieve()
            .bodyToMono(String.class)
            .block();

    // 2 — extract raw text from the uploaded resume PDF
    String resumeText = resumeParserService.parse(resumePath);

    // 3 — Groq LLaMA scores the resume against the JD

            openAIService.scoreResume(resumeText, jobJson);

    // 4 — persist score + emit event for Notification Service

    eventProducer.publishScreeningCompleted(applicationId, result);

/* ───────────── syntax highlighting ───────────── */
const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

const hlJava = (code) =>
  esc(code).replace(
    /(\/\*\*[\s\S]*?\*\/)|(\/\/[^\n]*)|(&quot;|"(?:[^"\\]|\\.)*")|(@\w+)|\b(public|private|protected|static|final|class|interface|void|return|new|if|else|try|catch|throws|throw|import|package|extends|implements|null|boolean|int|long|byte|true|false)\b|\b(String|List|Map|Long|JsonNode|ObjectMapper|WebhookPayload|ReviewResult|ScreeningResultDto|Mac|SecretKeySpec|MessageDigest|StandardCharsets|Exception|GitHubClient|GeminiClient|DiffChunkerService|ScreeningService)\b/g,
    (m, doc, com, str, ann, kw, typ) => {
      if (doc) return `<span style="color:${T.dim};font-style:italic">${doc}</span>`;
      if (com) return `<span style="color:${T.dim};font-style:italic">${com}</span>`;
      if (str) return `<span style="color:${T.green}">${str}</span>`;
      if (ann) return `<span style="color:${T.yellow}">${ann}</span>`;
      if (kw) return `<span style="color:${T.orange}">${kw}</span>`;
      if (typ) return `<span style="color:${T.blue}">${typ}</span>`;
      return m;
    }
  );

const hlXml = (code) =>
  esc(code).replace(
    /(&lt;!--[\s\S]*?--&gt;)|(&lt;\/?)([\w.?-]+)|("[^"]*")|(&gt;)/g,
    (m, com, open, tag, str, close) => {
      if (com) return `<span style="color:${T.dim};font-style:italic">${com}</span>`;
      if (open !== undefined && tag) return `<span style="color:${T.faint}">${open}</span><span style="color:${T.red}">${tag}</span>`;
      if (str) return `<span style="color:${T.green}">${str}</span>`;
      if (close) return `<span style="color:${T.faint}">${close}</span>`;
      return m;
    }
  );

const hlBash = (code) =>
  esc(code).replace(
    /(#[^\n]*)|("(?:[^"\\]|\\.)*")|\b(echo|exit|set|open)\b|^([A-Z_]+)(?==)/gm,
    (m, com, str, kw, varname) => {
      if (com) return `<span style="color:${T.dim};font-style:italic">${com}</span>`;
      if (str) return `<span style="color:${T.green}">${str}</span>`;
      if (kw) return `<span style="color:${T.orange}">${kw}</span>`;
      if (varname) return `<span style="color:${T.purple}">${varname}</span>`;
      return m;
    }
  );

/* fix escaped dollar-brace sequences for display */
const undollar = (s) => s.replace(/\\u0024/g, "$");

/* ───────────── small components ───────────── */
function CodeBlock({ code, lang = "java", maxH = 460 }) {
  const raw = undollar(code);
  const html = lang === "java" ? hlJava(raw) : lang === "xml" ? hlXml(raw) : hlBash(raw);

  return (
    <div style={{ display: "flex", background: "#0B0F16", border: `1px solid ${T.line}`, borderRadius: 6, overflow: "hidden" }}>

    const t = setInterval(tick, 30000);
    return () => clearInterval(t);

  const openTab = useCallback((id) => {
    setTab(id);
    window.scrollTo({ top: 0, behavior: "smooth" });

  if (!booted) return <Boot onDone={() => setBooted(true)} />;

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.fg, fontFamily: "'JetBrains Mono', monospace", display: "flex", flexDirection: "column" }}>

        ::-webkit-scrollbar-thumb{background:${T.line};border-radius:4px}
        ::-webkit-scrollbar-thumb:hover{background:${T.faint}}

        <div style={{ display: "flex", gap: 7 }}>
          <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#FF5F57" }} />
          <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#FEBC2E" }} />
          <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#28C840" }} />
        </div>
        <div style={{ flex: 1, textAlign: "center", fontSize: 11, color: T.dim }}>
          sahil@dev — ~/portfolio — -zsh
        </div>
        <div style={{ fontSize: 10, color: T.faint }}>{clock} IST</div>
      </div>

      {/* ── editor tabs ── */}
      <div style={{ display: "flex", background: T.panel, borderBottom: `1px solid ${T.line}`, overflowX: "auto" }}>

            display: "flex", alignItems: "center", gap: 8, padding: "10px 18px",

            border: "none", borderRight: `1px solid ${T.line}`,
            borderTop: `2px solid ${tab === t.id ? t.dot : "transparent"}`,

            <span style={{ width: 7, height: 7, borderRadius: 2, background: t.dot, opacity: tab === t.id ? 1 : 0.4 }} />
            {t.label}
          </button>
